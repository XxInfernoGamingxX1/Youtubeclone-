<!DOCTYPE html>
<html>
<head>
  <title>Lunify</title>
  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: Arial;
    }

    header {
      display: flex;
      padding: 10px;
      background: #181818;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px;
      background: #ff0033;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .container {
      display: flex;
    }

    .videos {
      width: 30%;
      height: 100vh;
      overflow-y: auto;
      border-right: 1px solid #333;
    }

    .video {
      display: flex;
      gap: 10px;
      padding: 10px;
      cursor: pointer;
    }

    .video:hover {
      background: #222;
    }

    .player {
      flex: 1;
      padding: 20px;
    }

    iframe {
      width: 100%;
      height: 500px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<header>
  <input id="search" placeholder="Search on Lunify...">
  <button onclick="search()">Search</button>
</header>

<div class="container">
  <div class="videos" id="videos"></div>
  <div class="player">
    <iframe id="player"></iframe>
  </div>
</div>

<script>
const API = "https://YOUR-BACKEND.onrender.com";

async function search() {
  const query = document.getElementById("search").value;

  const res = await fetch(`${API}/search?q=${query}`);
  const data = await res.json();

  const container = document.getElementById("videos");
  container.innerHTML = "";

  data.forEach(video => {
    const div = document.createElement("div");
    div.className = "video";

    div.innerHTML = `
      <img src="${video.snippet.thumbnails.medium.url}" width="120">
      <div>
        <h4>${video.snippet.title}</h4>
        <p>${video.snippet.channelTitle}</p>
      </div>
    `;

    div.onclick = () => {
      document.getElementById("player").src =
        `https://www.youtube.com/embed/${video.id.videoId}?autoplay=1`;
    };

    container.appendChild(div);
  });
}
</script>

</body>
</html>
