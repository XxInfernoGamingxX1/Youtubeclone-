<!DOCTYPE html>
<html>
<head>
  <title>Youtube Clone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0b0b0f;
      color: white;
      overflow: hidden;
    }

    header {
      display: flex;
      padding: 12px;
      background: rgba(20,20,25,0.7);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: #1a1a22;
      color: white;
      outline: none;
    }

    button {
      padding: 12px 16px;
      border: none;
      background: linear-gradient(135deg, #ff004c, #ff3d00);
      color: white;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      transform: scale(1.05);
    }

    .container {
      display: flex;
      height: calc(100vh - 60px);
      transition: 0.3s;
    }

    .videos {
      width: 320px;
      overflow-y: auto;
      border-right: 1px solid #222;
      transition: 0.3s;
    }

    .video {
      display: flex;
      gap: 10px;
      padding: 12px;
      cursor: pointer;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeIn 0.4s forwards;
    }

    .video:hover {
      background: #1a1a22;
    }

    .video img {
      width: 120px;
      border-radius: 10px;
    }

    .video h4 {
      margin: 0;
      font-size: 14px;
    }

    .video p {
      margin: 4px 0 0;
      font-size: 12px;
      color: #aaa;
    }

    .player {
      flex: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    iframe {
      width: 100%;
      height: 70vh;
      border-radius: 16px;
      border: none;
      transition: 0.3s;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
    }

    .empty {
      text-align: center;
      margin-top: 100px;
      color: #777;
    }

    /* MOBILE MODE */
    @media (max-width: 768px) {
      body {
        overflow: auto;
      }

      .container {
        flex-direction: column;
      }

      .videos {
        width: 100%;
        height: 40vh;
        border-right: none;
        border-bottom: 1px solid #222;
      }

      iframe {
        height: 40vh;
      }
    }

    /* ANIMATIONS */
    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>
</head>

<body>

<header>
  <input id="search" placeholder="Search Lunify...">
  <button onclick="search()">Search</button>
</header>

<div class="container">
  <div class="videos" id="videos"></div>

  <div class="player">
    <iframe id="player"></iframe>
    <div class="empty" id="empty">Search something to start 🎧</div>
  </div>
</div>

<script>
const API = "https://youtubeclone-nfu1.onrender.com";

async function search() {
  const query = document.getElementById("search").value;
  const container = document.getElementById("videos");

  container.innerHTML = "Loading...";

  try {
    const res = await fetch(`${API}/search?q=${query}`);
    const data = await res.json();

    container.innerHTML = "";

    data.forEach((video, i) => {
      const div = document.createElement("div");
      div.className = "video";
      div.style.animationDelay = `${i * 0.05}s`;

      div.innerHTML = `
        <img src="${video.snippet.thumbnails.medium.url}">
        <div>
          <h4>${video.snippet.title}</h4>
          <p>${video.snippet.channelTitle}</p>
        </div>
      `;

      div.onclick = () => {
        document.getElementById("player").style.opacity = "0";

        setTimeout(() => {
          document.getElementById("player").src =
            `https://www.youtube.com/embed/${video.id.videoId}?autoplay=1`;

          document.getElementById("player").style.opacity = "1";
        }, 150);

        document.getElementById("empty").style.display = "none";
      };

      container.appendChild(div);
    });

  } catch {
    container.innerHTML = "Error loading videos";
  }
}
</script>

</body>
</html>
